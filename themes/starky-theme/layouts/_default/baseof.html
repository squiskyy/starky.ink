<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
    <div class="bg"></div>
    <div class="twinkle"></div>
    <div class="twinkle"></div>
    <div class="twinkle"></div>
    <div class="twinkle"></div>
    
    <header class="site-header">
        <nav class="site-nav">
            <a href="{{ "/" | relURL }}" class="site-logo">starky<span>.</span>ink</a>
            <ul class="nav-links">
                {{ range .Site.Menus.main }}
                <li><a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
                {{ end }}
            </ul>
        </nav>
    </header>
    
    <main class="site-main">
        {{ block "main" . }}{{ end }}
    </main>
    
    <footer class="site-footer">
        <p>© {{ now.Format "2006" }} Kelly Starky</p>
    </footer>
</body>
</html>
