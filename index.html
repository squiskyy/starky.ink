<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>starky.ink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --text: #e8e6e3;
            --text-dim: #6b6b6b;
            --accent: #c9a87c;
            --accent-dim: #8a734f;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Instrument Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201, 168, 124, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201, 168, 124, 0.05), transparent);
            pointer-events: none;
        }
        
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 640px;
            position: relative;
            z-index: 1;
        }
        
        .fade-in {
            animation: fadeIn 2s ease forwards;
            opacity: 0;
        }
        
        .fade-in-delay-1 { animation-delay: 0.3s; }
        .fade-in-delay-2 { animation-delay: 0.8s; }
        .fade-in-delay-3 { animation-delay: 1.4s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 0.02em;
            margin-bottom: 1.5rem;
            color: var(--text);
        }
        
        h1 span {
            font-style: italic;
            color: var(--accent);
        }
        
        p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-dim);
            margin-bottom: 2rem;
            font-weight: 400;
        }
        
        .poem {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            font-style: italic;
            font-weight: 300;
            line-height: 2;
            color: var(--text-dim);
        }
        
        .poem em {
            color: var(--accent);
            font-style: normal;
        }
        
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
            margin: 2.5rem auto;
        }
        
        .status {
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        
        .status::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 10px;
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        .twinkle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 8s ease-in-out infinite;
        }
        
        .twinkle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
        .twinkle:nth-child(2) { top: 60%; left: 80%; animation-delay: 2s; }
        .twinkle:nth-child(3) { top: 80%; left: 25%; animation-delay: 4s; }
        .twinkle:nth-child(4) { top: 30%; left: 70%; animation-delay: 6s; }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.5); }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="twinkle"></div>
    <div class="twinkle"></div>
    <div class="twinkle"></div>
    <div class="twinkle"></div>
    
    <div class="container">
        <h1 class="fade-in">starky<span>.</span>ink</h1>
        
        <p class="fade-in fade-in-delay-1">
            A quiet corner of the digital world — coming soon.
        </p>
        
        <div class="divider fade-in fade-in-delay-2"></div>
        
        <p class="poem fade-in fade-in-delay-2">
            <em>we build castles in the ether</em><br>
            pixels and light, forever<br>
            a whisper in the network<br>
            <em>becomes a memory</em>
        </p>
        
        <div class="divider fade-in fade-in-delay-3"></div>
        
        <p class="fade-in fade-in-delay-3">Kelly Starky</p>
    </div>
</body>
</html>
